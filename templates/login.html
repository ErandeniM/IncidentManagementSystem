<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso para Padres</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif; min-height: 100vh;
            background: #fff8f0; display: flex; align-items: center;
            justify-content: center; padding: 1rem; overflow: hidden; position: relative;
        }
        .bubble { position: fixed; border-radius: 50%; opacity: .12; pointer-events: none; }
        .b1 { width:320px; height:320px; background:#ff8c42; top:-80px; left:-80px; }
        .b2 { width:200px; height:200px; background:#4ecdc4; bottom:-60px; right:-60px; }
        .b3 { width:150px; height:150px; background:#ffe66d; top:40%; right:5%; }
        .b4 { width:100px; height:100px; background:#a8e6cf; bottom:20%; left:5%; }
        .card {
            background: #fff; border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,.10);
            padding: 2.5rem 2rem; width: 100%; max-width: 420px;
            position: relative; z-index: 1;
        }
        .logo-area { text-align: center; margin-bottom: 1.75rem; }
        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #ff8c42, #ff6b6b);
            border-radius: 20px; display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 2rem; margin-bottom: .75rem;
            box-shadow: 0 4px 15px rgba(255,107,107,.3);
        }
        .logo-area h1 { font-size: 1.5rem; font-weight: 800; color: #2d3436; }
        .logo-area p  { font-size: .88rem; color: #b2bec3; margin-top: .25rem; }
        .alert-warn {
            background: #fff3cd; border: 1.5px solid #ffc107;
            border-radius: 12px; padding: .65rem 1rem;
            font-size: .85rem; color: #856404; margin-bottom: 1.25rem;
        }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-weight: 700; font-size: .88rem; color: #636e72; margin-bottom: .4rem; }
        .form-group input {
            width: 100%; padding: .75rem 1rem;
            border: 2px solid #e9ecef; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-size: .95rem;
            color: #2d3436; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-group input:focus { border-color: #ff8c42; box-shadow: 0 0 0 3px rgba(255,140,66,.15); }
        .form-group small { font-size: .76rem; color: #b2bec3; margin-top: .3rem; display: block; }
        .btn-login {
            width: 100%; padding: .85rem;
            background: linear-gradient(135deg, #ff8c42, #ff6b6b);
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
            cursor: pointer; margin-top: .5rem;
            box-shadow: 0 4px 15px rgba(255,107,107,.3);
            transition: transform .15s, box-shadow .15s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,.4); }
        .footer-note { text-align: center; margin-top: 1.25rem; font-size: .78rem; color: #b2bec3; }
    </style>
</head>
<body>
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="card">
        <div class="logo-area">
            <div class="logo-icon">🏫</div>
            <h1>Portal de Padres</h1>
            <p>Consulta el seguimiento de tu hijo</p>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for msg in messages %}
                <div class="alert-warn">⚠️ {{ msg }}</div>
            {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>CURP del alumno</label>
                <input type="text" name="curp" placeholder="Ej: MABC010101"
                       maxlength="10" style="text-transform:uppercase" required>
                <small>Primeros 10 caracteres del CURP</small>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Ingresar →</button>
        </form>
        <div class="footer-note">¿Problemas para acceder? Contacta a la maestra.</div>
    </div>
</body>
</html>
